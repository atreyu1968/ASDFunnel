openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Lennox Hale Publishing Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: authors
    description: Author/pen name management
  - name: series
    description: Book series management
  - name: books
    description: Book management
  - name: mailing-lists
    description: Mailing list management (by author and language)
  - name: subscribers
    description: Email subscriber management
  - name: dashboard
    description: Dashboard and analytics
  - name: landing-pages
    description: Multi-language landing page management
  - name: email-templates
    description: Email template management
  - name: automations
    description: Automation rules and execution
  - name: capture
    description: Public email capture endpoints
  - name: settings
    description: Email provider configuration
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Authors ──
  /authors:
    get:
      operationId: listAuthors
      tags: [authors]
      summary: List all authors
      responses:
        "200":
          description: List of authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"
    post:
      operationId: createAuthor
      tags: [authors]
      summary: Create a new author
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuthorBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"

  /authors/{id}:
    get:
      operationId: getAuthor
      tags: [authors]
      summary: Get author by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Author details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "404":
          description: Not found
    put:
      operationId: updateAuthor
      tags: [authors]
      summary: Update an author
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuthorBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
    delete:
      operationId: deleteAuthor
      tags: [authors]
      summary: Delete an author
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Series ──
  /series:
    get:
      operationId: listSeries
      tags: [series]
      summary: List all series
      parameters:
        - name: authorId
          in: query
          required: false
          schema:
            type: integer
        - name: language
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Series"
    post:
      operationId: createSeries
      tags: [series]
      summary: Create a new series
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSeriesBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Series"

  /series/{id}:
    get:
      operationId: getSeries
      tags: [series]
      summary: Get series by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Series details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesWithBooks"
        "404":
          description: Not found
    put:
      operationId: updateSeries
      tags: [series]
      summary: Update a series
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSeriesBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Series"
    delete:
      operationId: deleteSeries
      tags: [series]
      summary: Delete a series
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Books ──
  /books:
    get:
      operationId: listBooks
      tags: [books]
      summary: List all books
      parameters:
        - name: seriesId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, production, ready, scheduled, published]
        - name: funnelRole
          in: query
          required: false
          schema:
            type: string
            enum: [lead_magnet, traffic_entry, core_offer, crossover_bridge]
        - name: language
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      operationId: createBook
      tags: [books]
      summary: Create a new book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /books/{id}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Not found
    put:
      operationId: updateBook
      tags: [books]
      summary: Update a book
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
    delete:
      operationId: deleteBook
      tags: [books]
      summary: Delete a book
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Mailing Lists ──
  /mailing-lists:
    get:
      operationId: listMailingLists
      tags: [mailing-lists]
      summary: List all mailing lists
      parameters:
        - name: authorId
          in: query
          required: false
          schema:
            type: integer
        - name: language
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of mailing lists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MailingList"
    post:
      operationId: createMailingList
      tags: [mailing-lists]
      summary: Create a new mailing list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMailingListBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailingList"

  /mailing-lists/{id}:
    get:
      operationId: getMailingList
      tags: [mailing-lists]
      summary: Get mailing list by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Mailing list details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailingListWithSubscribers"
        "404":
          description: Not found
    put:
      operationId: updateMailingList
      tags: [mailing-lists]
      summary: Update a mailing list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMailingListBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailingList"
    delete:
      operationId: deleteMailingList
      tags: [mailing-lists]
      summary: Delete a mailing list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Subscribers ──
  /subscribers:
    get:
      operationId: listSubscribers
      tags: [subscribers]
      summary: List all subscribers
      parameters:
        - name: mailingListId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, active, unsubscribed, bounced]
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum: [lead_magnet, landing_page, manual, import, capture]
        - name: language
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of subscribers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscriber"
    post:
      operationId: createSubscriber
      tags: [subscribers]
      summary: Add a new subscriber
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriberBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscriber"

  /subscribers/{id}:
    get:
      operationId: getSubscriber
      tags: [subscribers]
      summary: Get subscriber by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subscriber details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscriber"
        "404":
          description: Not found
    put:
      operationId: updateSubscriber
      tags: [subscribers]
      summary: Update a subscriber
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriberBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscriber"
    delete:
      operationId: deleteSubscriber
      tags: [subscribers]
      summary: Delete a subscriber
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /subscribers/import:
    post:
      operationId: importSubscribers
      tags: [subscribers]
      summary: Bulk import subscribers to a mailing list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportSubscribersBody"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportSubscribersResult"

  # ── Landing Pages ──
  /landing-pages:
    get:
      operationId: listLandingPages
      tags: [landing-pages]
      summary: List all landing pages
      parameters:
        - name: entityType
          in: query
          required: false
          schema:
            type: string
            enum: [author, series, book]
        - name: entityId
          in: query
          required: false
          schema:
            type: integer
        - name: language
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of landing pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LandingPage"
    post:
      operationId: createLandingPage
      tags: [landing-pages]
      summary: Create a new landing page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLandingPageBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingPage"

  /landing-pages/{id}:
    get:
      operationId: getLandingPage
      tags: [landing-pages]
      summary: Get landing page by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Landing page details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingPage"
        "404":
          description: Not found
    put:
      operationId: updateLandingPage
      tags: [landing-pages]
      summary: Update a landing page
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLandingPageBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingPage"
    delete:
      operationId: deleteLandingPage
      tags: [landing-pages]
      summary: Delete a landing page
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Email Templates ──
  /email-templates:
    get:
      operationId: listEmailTemplates
      tags: [email-templates]
      summary: List all email templates
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
        - name: templateType
          in: query
          required: false
          schema:
            type: string
            enum: [welcome, lead_magnet_delivery, new_release, series_update, promotional, re_engagement, confirmation, unsubscribe]
        - name: mailingListId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of email templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailTemplate"
    post:
      operationId: createEmailTemplate
      tags: [email-templates]
      summary: Create a new email template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmailTemplateBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"

  /email-templates/{id}:
    get:
      operationId: getEmailTemplate
      tags: [email-templates]
      summary: Get email template by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email template details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
        "404":
          description: Not found
    put:
      operationId: updateEmailTemplate
      tags: [email-templates]
      summary: Update an email template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmailTemplateBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
    delete:
      operationId: deleteEmailTemplate
      tags: [email-templates]
      summary: Delete an email template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Automation Rules ──
  /automation-rules:
    get:
      operationId: listAutomationRules
      tags: [automations]
      summary: List all automation rules
      parameters:
        - name: mailingListId
          in: query
          required: false
          schema:
            type: integer
        - name: triggerType
          in: query
          required: false
          schema:
            type: string
            enum: [new_subscriber, book_published, series_complete, subscriber_tagged, scheduled]
        - name: isActive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of automation rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationRule"
    post:
      operationId: createAutomationRule
      tags: [automations]
      summary: Create a new automation rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAutomationRuleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"

  /automation-rules/{id}:
    get:
      operationId: getAutomationRule
      tags: [automations]
      summary: Get automation rule by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Automation rule details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRuleWithLogs"
        "404":
          description: Not found
    put:
      operationId: updateAutomationRule
      tags: [automations]
      summary: Update an automation rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAutomationRuleBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"
    delete:
      operationId: deleteAutomationRule
      tags: [automations]
      summary: Delete an automation rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /automation-rules/{id}/toggle:
    post:
      operationId: toggleAutomationRule
      tags: [automations]
      summary: Toggle automation rule active/inactive
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"

  /automation-rules/{id}/execute:
    post:
      operationId: executeAutomationRule
      tags: [automations]
      summary: Manually execute an automation rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationExecutionResult"

  /automation-logs:
    get:
      operationId: listAutomationLogs
      tags: [automations]
      summary: List automation execution logs
      parameters:
        - name: ruleId
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of automation logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationLog"

  # ── Public Capture ──
  /capture:
    post:
      operationId: captureEmail
      tags: [capture]
      summary: Public email capture endpoint for landing pages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptureEmailBody"
      responses:
        "200":
          description: Capture result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptureEmailResult"

  /capture/by-landing-page/{landingPageId}:
    post:
      operationId: captureByLandingPage
      tags: [capture]
      summary: Capture email via a specific landing page
      parameters:
        - name: landingPageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptureByLandingPageBody"
      responses:
        "200":
          description: Capture result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptureEmailResult"

  # ── Email Confirmation & Unsubscribe ──
  /confirm/{token}:
    get:
      operationId: confirmEmail
      tags: [capture]
      summary: Confirm email subscription (double opt-in)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Confirmation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmationResult"

  /unsubscribe/{token}:
    get:
      operationId: getUnsubscribePage
      tags: [capture]
      summary: Show unsubscribe confirmation page
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unsubscribe page data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnsubscribePageData"

    post:
      operationId: processUnsubscribe
      tags: [capture]
      summary: Process unsubscribe request
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unsubscribe result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnsubscribeResult"

  # ── Email Settings ──
  /settings/email:
    get:
      operationId: getEmailSettings
      tags: [settings]
      summary: Get email provider configuration
      responses:
        "200":
          description: Email settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSettingsResponse"
    put:
      operationId: updateEmailSettings
      tags: [settings]
      summary: Update email provider configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmailSettingsBody"
      responses:
        "200":
          description: Updated email settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSettingsResponse"

  /settings/email/test:
    post:
      operationId: testEmailSettings
      tags: [settings]
      summary: Send a test email to verify configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestEmailBody"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestEmailResult"

  # ── Storage ──
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ── Manuscript / AI Generation ──
  /books/{id}/upload-manuscript:
    post:
      tags: [books]
      operationId: uploadManuscript
      summary: Upload a .docx manuscript and generate landing page with AI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadManuscriptBody'
      responses:
        '200':
          description: Landing page generated from manuscript
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedLandingPage'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ── Dashboard / Analytics ──
  /dashboard/subscriber-stats:
    get:
      operationId: getSubscriberStats
      tags: [dashboard]
      summary: Get subscriber and mailing list statistics
      responses:
        "200":
          description: Subscriber statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberStats"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/publication-calendar:
    get:
      operationId: getPublicationCalendar
      tags: [dashboard]
      summary: Get publication calendar (upcoming releases)
      responses:
        "200":
          description: Calendar entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEntry"

  /dashboard/funnel-overview:
    get:
      operationId: getFunnelOverview
      tags: [dashboard]
      summary: Get funnel role breakdown
      responses:
        "200":
          description: Funnel overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelOverview"

  /dashboard/series-progress:
    get:
      operationId: getSeriesProgress
      tags: [dashboard]
      summary: Get progress per series
      responses:
        "200":
          description: Series progress list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeriesProgress"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent book activity
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

