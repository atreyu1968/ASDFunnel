kind = "web"
previewPath = "/"
title = "Lennox Hale Admin"
version = "1.0.0"
id = "artifacts/lennox-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18562

[services.development]
run = "pnpm --filter @workspace/lennox-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lennox-admin", "run", "build" ]
publicDir = "artifacts/lennox-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18562"
BASE_PATH = "/"
